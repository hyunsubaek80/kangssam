<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>강쌤철물 가격표</title>
	<link rel="stylesheet" href="css/style.css">
</head>

<body>
	<div class="container">
		<div class="cont1">
			<div class="cont1_col_top">
				<img src="img/t.png" alt="타이틀">
			</div>
			<div class="cont1_col_bottom">
				<div class="col_m">
					<span>- 출장비</span>
					<span>10,000</span>
				</div>
				<div class="col_m">
					<span>- 설치공임</span>
					<span>30,000</span>
				</div>
				<div class="col_m2">
					<span>총 비용</span>
					<span>40,000</span>
				</div>
			</div>
		</div>
		<div class="cont2">
			<div class="cont2_top">
				<img src="img/p1.png" alt="제품이미지">
			</div>
			<div class="cont2_bottom">
				<div class="prod_wrap">
					<div class="prod1">
						<span>제목</span>
						<span>내용내용</span>
					</div>
					<div class="prod2">
						<span>판매가격</span>
						<span>100,000</span>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
