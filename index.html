<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>강쌤철물 가격표</title>
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
	<div class="container">
		<div class="cont1">
			<div class="cont1_col_wrapper">
				<div class="cont1_col_top">
					<img src="img/title.png" alt="타이틀">
				</div>
			</div>
			
			<div class="gap160"></div>
			
			<div class="cont1_col_bottom">
				<div class="fixman">
					<img src="img/fixman.png" alt="캐릭터이미지">
				</div>
				<div class="price_title">
					<span>강쌤 설치 서비스</span>
				</div>
				<div class="col_m">
					<span>ㆍ출장비</span>
					<span>10,000</span>
				</div>
				<div class="col_m">
					<span>ㆍ설치공임</span>
					<span>30,000</span>
				</div>
				<div class="col_m2">
					<span>총 비용</span>
					<span>40,000</span>
				</div>
			</div>
		</div>
		<div class="cont2">
			<div class="detail_navi">
				<div class="navi_content">
					<div>
						<span>수전</span>
						<span>/</span>
						<span>세면수전</span>
					</div>
					<div>
						<i class="bi bi-house"></i>
					</div>
				</div>
				<div>
				</div>
			</div>
			<div class="cont2_top">
				<img src="img/p1.png" alt="제품이미지">
			</div>
			<div class="cont2_bottom">
				<div class="prod_wrap">
					<div class="prod1">
						<span>대림바스 DL-L2310SN</span>
						<span>생활과 품격을 아우르는 가장 독보적인 기술<br>대림바스 무광 세면 원홀 수전</span>
					</div>
					<div class="prod2">
						<span>판매가격</span>
						<span>100,000</span>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
